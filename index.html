<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Studyquest est une plateforme d'apprentissage interactive pour apprendre en s'amusant.">
  <title>Studyquest</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <meta name="theme-color" content="#ffd700">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <!-- Contenu de ton application -->
  <h1>Bienvenue sur Studyquest</h1>
  <p>Apprends en t'amusant.</p>

  <script>
    // Enregistrer le Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('ServiceWorker enregistré :', registration.scope);
          })
          .catch(error => {
            console.log('Échec de l\'enregistrement :', error);
          });
      });
    }

    // Écouter les événements de connexion/déconnexion
    window.addEventListener('online', () => {
      console.log('Connexion rétablie');
      document.dispatchEvent(new Event('connectionChanged'));
    });

    window.addEventListener('offline', () => {
      console.log('Hors ligne');
      document.dispatchEvent(new Event('connectionChanged'));
    });

    // Vérifier l'état de la connexion au chargement de la page
    if (!navigator.onLine) {
      console.log('Hors ligne au chargement de la page');
      document.dispatchEvent(new Event('connectionChanged'));
    }
  </script>
</body>
</html>
